    <script>
      // 在css加载前设置主题，避免闪屏
      (function () {
        var stored = localStorage.getItem('vibepage__theme__');
        var mode = stored ? JSON.parse(stored) : 1;
        document.documentElement.dataset.theme = mode === 1 ? 'dark' : 'light';
      })();
    </script>
